name: AccessGuard V5 CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: accessguard-v5-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - Tests et lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lancer tous les tests Pytest
        env:
          ACCESSGUARD_SECRET_KEY: ci-v5-test-secret-not-for-production
          ACCESSGUARD_TOKEN_EXPIRE_MINUTES: "60"
        run: |
          python -m pytest -v --junitxml=reports/pytest-v5.xml

      - name: Lancer le lint Python
        run: |
          flake8 app tests

      - name: Publier le rapport Pytest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-v5-report
          path: reports/pytest-v5.xml
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: Frontend - Installation et build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers frontend
        id: frontend-check
        shell: bash
        run: |
          if [ -f frontend/package.json ] && \
             [ -f frontend/package-lock.json ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Le frontend V5 ne possède pas encore package.json et package-lock.json."
          fi

      - name: Installer Node.js
        if: steps.frontend-check.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        if: steps.frontend-check.outputs.available == 'true'
        working-directory: frontend
        run: npm ci

      - name: Construire le frontend
        if: steps.frontend-check.outputs.available == 'true'
        working-directory: frontend
        run: npm run build

      - name: Échouer si le frontend V5 est absent
        if: steps.frontend-check.outputs.available != 'true'
        run: |
          echo "::error::Impossible de valider le frontend : fichiers npm absents."
          exit 1

  python-security:
    name: Sécurité - pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Auditer les dépendances Python
        run: |
          pip-audit -r requirements.txt

  frontend-security:
    name: Sécurité - npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers frontend
        run: |
          test -f frontend/package.json
          test -f frontend/package-lock.json

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Auditer les dépendances frontend
        working-directory: frontend
        run: npm audit --audit-level=high

  secrets:
    name: Sécurité - Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer tout l’historique Git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scanner les secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sensitive-files:
    name: Sécurité - Fichiers sensibles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers versionnés
        shell: bash
        run: |
          set -euo pipefail

          forbidden_files="$(
            git ls-files |
            grep -E '(^|/)(\.env|\.venv|accessguard\.db)($|/)' || true
          )"

          if [ -n "$forbidden_files" ]; then
            echo "::error::Des fichiers sensibles sont suivis par Git :"
            echo "$forbidden_files"
            exit 1
          fi

          echo "Aucun fichier sensible interdit n’est versionné."

      - name: Vérifier les motifs de secrets évidents
        shell: bash
        run: |
          set -euo pipefail

          if git grep -n -I -E \
            '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|AWS_SECRET_ACCESS_KEY=|ACCESSGUARD_SECRET_KEY=[^$])' \
            -- \
            ':!.env.example' \
            ':!docs/**'; then
            echo "::error::Un secret potentiel a été trouvé."
            exit 1
          fi

          echo "Aucun motif de secret évident détecté."

  docker-compose:
    name: Docker - Validation Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier la configuration Docker Compose
        run: |
          docker compose config --quiet

  quality-gate:
    name: V5 - Quality Gate
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - python-security
      - frontend-security
      - secrets
      - sensitive-files
      - docker-compose
    if: always()

    steps:
      - name: Vérifier tous les jobs obligatoires
        shell: bash
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"

          if echo "$results" | grep -q '"result": "failure"'; then
            echo "::error::Au moins un contrôle obligatoire V5 a échoué."
            exit 1
          fi

          if echo "$results" | grep -q '"result": "cancelled"'; then
            echo "::error::Au moins un contrôle obligatoire V5 a été annulé."
            exit 1
          fi

          if echo "$results" | grep -q '"result": "skipped"'; then
            echo "::error::Au moins un contrôle obligatoire V5 a été ignoré."
            exit 1
          fi

          echo "Tous les contrôles obligatoires V5 sont validés."