name: AccessGuard V5 CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: accessguard-v5-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - Tests et lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lancer tous les tests Pytest
        env:
          ACCESSGUARD_SECRET_KEY: ci-v5-test-key-not-for-production
          ACCESSGUARD_TOKEN_EXPIRE_MINUTES: "60"
        run: |
          mkdir -p reports
          python -m pytest -v --junitxml=reports/pytest-v5.xml

      - name: Lancer le lint Python
        run: |
          flake8 app tests

      - name: Publier le rapport Pytest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-v5-report
          path: reports/pytest-v5.xml
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: Frontend - Installation et build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers frontend
        id: frontend-check
        shell: bash
        run: |
          if [ -f frontend/package.json ] && \
             [ -f frontend/package-lock.json ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::error::Le frontend V5 ne possède pas package.json ou package-lock.json."
          fi

      - name: Installer Node.js
        if: steps.frontend-check.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        if: steps.frontend-check.outputs.available == 'true'
        working-directory: frontend
        run: npm ci

      - name: Construire le frontend
        if: steps.frontend-check.outputs.available == 'true'
        working-directory: frontend
        run: npm run build

      - name: Échouer si le frontend V5 est absent
        if: steps.frontend-check.outputs.available != 'true'
        run: |
          echo "::error::Impossible de valider le frontend : fichiers npm absents."
          exit 1

  python-security:
    name: Sécurité - pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Auditer les dépendances Python
        run: |
          # Exception temporaire documentée :
          # aucune version corrigée n’est disponible pour cette alerte ecdsa.
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2026-1325

  frontend-security:
    name: Sécurité - npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers frontend
        run: |
          test -f frontend/package.json
          test -f frontend/package-lock.json

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Auditer les dépendances frontend
        working-directory: frontend
        run: npm audit --audit-level=high

  secrets:
    name: Sécurité - Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer tout l’historique Git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scanner les secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sensitive-files:
    name: Sécurité - Fichiers sensibles
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers versionnés
        shell: bash
        run: |
          set -euo pipefail

          forbidden_files="$(
            git ls-files |
            grep -E '(^|/)(\.env|\.venv|accessguard\.db)($|/)' || true
          )"

          if [ -n "$forbidden_files" ]; then
            echo "::error::Des fichiers sensibles sont suivis par Git :"
            echo "$forbidden_files"
            exit 1
          fi

          echo "Aucun fichier sensible interdit n’est versionné."

      - name: Vérifier les motifs de secrets évidents
        shell: bash
        run: |
          set -euo pipefail

          pattern='BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|AWS_SECRET_ACCESS_KEY=|ACCESSGUARD_SECRET_KEY='

          matches="$(
            git grep -n -I -E "$pattern" \
              -- \
              ':!.env.example' \
              ':!docs/**' \
              ':!.github/workflows/ci.yml' \
              || true
          )"

          if [ -n "$matches" ]; then
            echo "::error::Un secret potentiel a été trouvé :"
            echo "$matches"
            exit 1
          fi

          echo "Aucun motif de secret évident détecté."

  docker-compose:
    name: Docker - Validation Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier la configuration Docker Compose
        run: |
          docker compose config --quiet

  quality-gate:
    name: V5 - Quality Gate
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - python-security
      - frontend-security
      - secrets
      - sensitive-files
      - docker-compose
    if: always()

    steps:
      - name: Vérifier tous les jobs obligatoires
        shell: bash
        run: |
          backend_result="${{ needs.backend.result }}"
          frontend_result="${{ needs.frontend.result }}"
          python_security_result="${{ needs.python-security.result }}"
          frontend_security_result="${{ needs.frontend-security.result }}"
          secrets_result="${{ needs.secrets.result }}"
          sensitive_files_result="${{ needs.sensitive-files.result }}"
          docker_result="${{ needs.docker-compose.result }}"

          echo "Backend : $backend_result"
          echo "Frontend : $frontend_result"
          echo "pip-audit : $python_security_result"
          echo "npm audit : $frontend_security_result"
          echo "Gitleaks : $secrets_result"
          echo "Fichiers sensibles : $sensitive_files_result"
          echo "Docker Compose : $docker_result"

          if [ "$backend_result" != "success" ] || \
             [ "$frontend_result" != "success" ] || \
             [ "$python_security_result" != "success" ] || \
             [ "$frontend_security_result" != "success" ] || \
             [ "$secrets_result" != "success" ] || \
             [ "$sensitive_files_result" != "success" ] || \
             [ "$docker_result" != "success" ]; then
            echo "::error::Au moins un contrôle obligatoire V5 a échoué."
            exit 1
          fi

          echo "Tous les contrôles obligatoires V5 sont validés."