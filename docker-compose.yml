services:
  accessguard-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accessguard-api
    ports:
      - "8000:8000"
    environment:
      ACCESSGUARD_DATABASE_PATH: /app/data/accessguard.db
      ACCESSGUARD_SECRET_KEY: accessguard-docker-demo-secret-change-in-production
      ACCESSGUARD_ALGORITHM: HS256
      ACCESSGUARD_TOKEN_EXPIRE_MINUTES: "60"
    volumes:
      - accessguard_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: accessguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      accessguard-api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: accessguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  accessguard_data:
  grafana_data: