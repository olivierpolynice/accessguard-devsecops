[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra --strict-markers

markers =
    auth: tests d'authentification et de jetons JWT
    users: tests de gestion des utilisateurs
    rbac: tests de contrôle d'accès selon les rôles
    workflow: tests du workflow des demandes d'accès
    audit: tests des journaux d'audit
    monitoring: tests de santé, métriques et monitoring
    security: tests de sécurité généraux
    regression: tests de non-régression V1 à V4